<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <!-- ==================== ENCABEZADO Y NAVEGACIÓN ==================== -->
    <header>
        <h1>Food Store</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">Mis Pedidos</a></li>
                <li><a href="#">Carrito (0)</a></li>
                <li><a href="admin.html">Panel Admin</a></li>
            </ul>
        </nav>
    </header>

    <!-- ==================== BARRA LATERAL (ASIDE) ==================== -->
    <aside>
        <h2>Categorías</h2>
        <ul id="lista-categorias"> </ul>
    </aside>

    <!-- ==================== CONTENIDO PRINCIPAL ==================== -->
    <main>
        <!-- Buscador -->
        <section>
            <form action="#" method="get">
                <label for="buscar">Buscar producto:</label>
                <input type="search" id="buscar" name="buscar" placeholder="Ej: Hamburguesa doble">
                <button type="submit" class="btn-buscar">Buscar</button>
            </form>
        </section>

        <!-- Grilla de productos -->
        <h2>Nuestros Productos</h2>
        <section id="contenedor-productos"></section>
    </main>

    <!-- ==================== PIE DE PÁGINA ==================== -->
    <footer>
        <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
        <address>
            Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
        </address>
    </footer>
    <!-- ==================== ARCHIVOS JS ==================== -->
    <script src="./js/data.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
